<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dr Vehicle Care — Billing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #d10000;
            --red2: #ff3333;
            --dark: #111;
            --panel: #1a1a1a;
            --card: #222;
            --border: #333;
            --text: #eee;
            --muted: #888;
            --green: #22c55e;
            --yellow: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #900 0%, var(--red) 50%, var(--red2) 100%);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(180, 0, 0, .5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, .4));
        }

        .logo h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            line-height: 1;
        }

        .logo p {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: .8;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .2);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, .25);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
        }

        @media(max-width:800px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: var(--panel);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--red2);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cust-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media(max-width:500px) {
            .cust-grid {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        .field input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border .2s;
        }

        .field input:focus {
            border-color: var(--red2);
        }

        .field input::placeholder {
            color: #555;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }

        .svc-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color .2s;
            position: relative;
            overflow: hidden;
        }

        .svc-card.active {
            border-color: var(--red2);
            background: #2a1010;
        }

        .svc-card.active::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(211, 0, 0, .08), transparent);
            pointer-events: none;
        }

        .svc-name {
            font-weight: 600;
            font-size: 14px;
        }

        .svc-inputs {
            display: flex;
            gap: 8px;
        }

        .svc-inputs input {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 10px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            width: 50%;
            outline: none;
        }

        .svc-inputs input:focus {
            border-color: var(--red2);
        }

        .svc-toggle {
            border: none;
            border-radius: 6px;
            padding: 7px 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            width: 100%;
        }

        .svc-toggle.add-btn {
            background: var(--red);
            color: white;
        }

        .svc-toggle.add-btn:hover {
            background: var(--red2);
        }

        .svc-toggle.rem-btn {
            background: #1f3a1f;
            color: var(--green);
            border: 1px solid var(--green);
        }

        .bill-panel {
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        .bill-box {
            background: var(--panel);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 20px;
            overflow: hidden;
        }

        .bill-header {
            text-align: center;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }

        .bill-shop-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--red2);
        }

        .bill-sub {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bill-info {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .bill-info span {
            color: var(--text);
            font-weight: 500;
        }

        .bill-items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .bill-items-table th {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            text-align: left;
            padding: 6px 4px;
            border-bottom: 1px solid var(--border);
        }

        .bill-items-table td {
            padding: 7px 4px;
            border-bottom: 1px solid #2a2a2a;
            color: #ddd;
        }

        .bill-items-table td:last-child {
            text-align: right;
        }

        .bill-empty {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 20px 0;
        }

        .bill-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed var(--border);
            padding-top: 12px;
            margin-top: 4px;
        }

        .bill-total-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .bill-total-amount {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--red2);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .act-btn {
            padding: 11px;
            border: none;
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: filter .2s, transform .1s;
        }

        .act-btn:hover {
            filter: brightness(1.15);
        }

        .act-btn:active {
            transform: scale(.97);
        }

        .btn-print {
            background: var(--red);
            color: white;
            grid-column: span 2;
        }

        .btn-excel {
            background: #1a3320;
            color: var(--green);
            border: 1px solid var(--green);
        }

        .btn-wa {
            background: #0d2d1a;
            color: #25d366;
            border: 1px solid #25d366;
        }

        .btn-clear {
            background: #1f1f1f;
            color: #aaa;
            border: 1px solid var(--border);
            grid-column: span 2;
        }

        .dropdown-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .dropdown-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .modal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--red2);
        }

        .close-btn {
            background: #333;
            border: none;
            color: #aaa;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .history-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .h-name {
            font-weight: 600;
            font-size: 14px;
        }

        .h-bike {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .h-total {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--red2);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1f2f1f;
            color: var(--green);
            border: 1px solid var(--green);
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all .3s;
            z-index: 999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.red {
            background: #2a1010;
            color: var(--red2);
            border-color: var(--red2);
        }

        @media print {
            body * {
                visibility: hidden !important;
            }

            #printArea,
            #printArea * {
                visibility: visible !important;
            }

            #printArea {
                position: fixed;
                top: 0;
                left: 0;
                width: 80mm;
                background: white;
                color: black;
                padding: 10mm;
                font-family: monospace;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <span class="logo-icon">🔧</span>
            <div>
                <h1>DR VEHICLE CARE</h1>
                <p>Service &amp; Billing</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="openHistory('Today')">📋 Today</button>
            <button class="icon-btn" onclick="openHistory('Yesterday')">📂 Yesterday</button>
            <button class="icon-btn" onclick="openMonthHistory()">📅 Month</button>
        </div>
    </div>

    <div class="container">
        <div>
            <div class="section">
                <div class="section-title">👤 Customer Details</div>
                <div class="cust-grid">
                    <div class="field"><label>Customer Name</label><input id="customerName"
                            placeholder="e.g. Rahul Patil"></div>
                    <div class="field"><label>Mobile Number</label><input id="mobile" placeholder="e.g. 9876543210"
                            maxlength="10" type="tel"></div>
                    <div class="field"><label>Bike Number</label><input id="bikeNumber" placeholder="e.g. MH09 AB 1234">
                    </div>
                    <div class="field"><label>Odometer (KM)</label><input id="bikeKm" placeholder="e.g. 12500"
                            type="number"></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">🛠 Services</div>
                <div id="servicesGrid" class="services-grid"></div>
            </div>
        </div>

        <div class="bill-panel">
            <div class="bill-box">
                <div class="bill-header">
                    <div class="bill-shop-name">DR VEHICLE CARE</div>
                    <div class="bill-sub">Service Invoice</div>
                </div>
                <div class="bill-info">
                    <div>Customer: <span id="bName">—</span></div>
                    <div>Mobile: <span id="bMobile">—</span></div>
                    <div>Bike No: <span id="bBike">—</span></div>
                    <div>KM: <span id="bKm">—</span></div>
                    <div>Date: <span id="bDate">—</span></div>
                </div>
                <table class="bill-items-table">
                    <thead>
                        <tr>
                            <th>Service</th>
                            <th>Qty</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="billBody">
                        <tr>
                            <td colspan="3">
                                <div class="bill-empty">No services added yet</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="bill-total-row">
                    <span class="bill-total-label">Total</span>
                    <span class="bill-total-amount" id="billTotal">₹0</span>
                </div>
                <div class="actions">
                    <button class="act-btn btn-print" onclick="printBill()">🖨 Print Bill</button>
                    <button class="act-btn btn-excel" onclick="downloadCSV()">📊 Excel</button>
                    <button class="act-btn btn-wa" onclick="sendWhatsApp()">💬 WhatsApp</button>
                    <button class="act-btn btn-clear" onclick="clearAll()">🗑 Clear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="dropdown-overlay" id="historyModal" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Bills</span>
                <button class="close-btn"
                    onclick="document.getElementById('historyModal').classList.remove('open')">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div id="printArea" style="display:none;"></div>

    <script>
        // ── STORAGE HELPERS ──────────────────────────────────────────────────────────
        // Uses window.storage (persistent) with localStorage as fallback

        async function storageGet(key) {
            try {
                if (window.storage) {
                    const result = await window.storage.get(key);
                    return result ? JSON.parse(result.value) : null;
                }
            } catch (e) { }
            try {
                const v = localStorage.getItem(key);
                return v ? JSON.parse(v) : null;
            } catch (e) { return null; }
        }

        async function storageSet(key, value) {
            try {
                if (window.storage) {
                    await window.storage.set(key, JSON.stringify(value));
                    return;
                }
            } catch (e) { }
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { }
        }

        // ── BILL KEY FORMAT ──────────────────────────────────────────────────────────
        // Key: "bills:YYYY-MM-DD"  Value: array of bill objects
        // Each bill: { name, mobile, bike, km, total, items: [{name,price,qty}], ts }

        function todayKey() {
            const d = new Date();
            return `bills:${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function dateKey(date) {
            // date is a Date object
            return `bills:${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function formatDisplayDate(dateStr) {
            // dateStr: "YYYY-MM-DD"
            const [y, m, d] = dateStr.replace('bills:', '').split('-');
            return `${d}/${m}/${y}`;
        }

        async function saveBill(name, mobile, bike, km, total, items) {
            const key = todayKey();
            let bills = await storageGet(key) || [];
            bills.push({
                name: name || '—',
                mobile: mobile || '—',
                bike: bike || '—',
                km: km || '—',
                total: total || 0,
                items: items.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
                ts: Date.now()
            });
            await storageSet(key, bills);
        }

        async function loadBillsForKey(key) {
            return await storageGet(key) || [];
        }

        async function getAllBillKeys() {
            // List all keys starting with "bills:"
            try {
                if (window.storage) {
                    const result = await window.storage.list('bills:');
                    return result ? result.keys : [];
                }
            } catch (e) { }
            // localStorage fallback: scan all keys
            const keys = [];
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith('bills:')) keys.push(k);
                }
            } catch (e) { }
            return keys;
        }

        // ── SERVICES ────────────────────────────────────────────────────────────────
        const services = [
            { name: "Engine Oil", price: 400 },
            { name: "Brake Cleaning", price: 150 },
            { name: "Air Filter", price: 100 },
            { name: "Chain Lubrication", price: 80 },
            { name: "Tyre Check", price: 50 },
            { name: "Battery Check", price: 60 },
            { name: "Spark Plug", price: 120 },
            { name: "Coolant", price: 200 },
            { name: "Full Service", price: 900 },
            { name: "Carburettor Cleaning", price: 250 },
            { name: "Washing", price: 100 },
        ];

        let cart = {};
        let customItems = [];
        let customIdCounter = 0;

        function renderServices() {
            const grid = document.getElementById("servicesGrid");
            grid.innerHTML = "";

            services.forEach((s, i) => {
                const inCart = !!cart[i];
                const div = document.createElement("div");
                div.className = "svc-card" + (inCart ? " active" : "");
                div.innerHTML = `
            <div class="svc-name">${s.name}</div>
            <div class="svc-inputs">
                <input id="price-${i}" type="number" value="${inCart ? cart[i].price : s.price}" placeholder="Price ₹">
                <input id="qty-${i}" type="number" value="${inCart ? cart[i].qty : 1}" min="1" placeholder="Qty">
            </div>
            <button class="svc-toggle ${inCart ? 'rem-btn' : 'add-btn'}" onclick="toggleService(${i})">
                ${inCart ? '✓ Added — Remove' : '+ Add'}
            </button>`;
                grid.appendChild(div);
            });

            customItems.forEach(ci => {
                const div = document.createElement("div");
                div.className = "svc-card" + (ci.inCart ? " active" : "");
                div.innerHTML = `
            <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);font-weight:700;">✏ Custom</span>
                <button onclick="removeCustomItem(${ci.id})" style="margin-left:auto;background:#2a1010;border:1px solid #aa3333;color:#ff6666;padding:2px 8px;border-radius:5px;font-size:11px;cursor:pointer;">✕ Delete</button>
            </div>
            <input id="clabel-${ci.id}" type="text" value="${ci.label}" placeholder="Work description…"
                style="background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;"
                oninput="syncCustomLabel(${ci.id})"
                onfocus="this.style.borderColor='var(--yellow)'"
                onblur="this.style.borderColor='var(--border)'">
            <div class="svc-inputs">
                <input id="cprice-${ci.id}" type="number" value="${ci.price}" placeholder="Price ₹" oninput="syncCustomCart(${ci.id})">
                <input id="cqty-${ci.id}" type="number" value="${ci.qty}" min="1" placeholder="Qty" oninput="syncCustomCart(${ci.id})">
            </div>
            <button class="svc-toggle ${ci.inCart ? 'rem-btn' : 'add-btn'}" onclick="toggleCustom(${ci.id})">
                ${ci.inCart ? '✓ Added — Remove' : '+ Add'}
            </button>`;
                grid.appendChild(div);
            });

            const addBtn = document.createElement("div");
            addBtn.className = "svc-card";
            addBtn.style.cssText = "border-style:dashed;border-color:var(--yellow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:120px;";
            addBtn.onclick = addCustomItem;
            addBtn.innerHTML = `<div style="font-size:28px;color:var(--yellow);">+</div><div style="font-size:13px;font-weight:600;color:var(--yellow);">Add Custom Work</div>`;
            grid.appendChild(addBtn);
        }

        function addCustomItem() {
            customIdCounter++;
            customItems.push({ id: customIdCounter, label: "", price: 0, qty: 1, inCart: false });
            renderServices();
            setTimeout(() => { const inp = document.getElementById("clabel-" + customIdCounter); if (inp) inp.focus(); }, 50);
        }

        function removeCustomItem(id) {
            customItems = customItems.filter(c => c.id !== id);
            delete cart["c" + id];
            renderServices();
            updateBill();
            toast("Custom item removed", true);
        }

        function syncCustomLabel(id) {
            const ci = customItems.find(c => c.id === id);
            if (!ci) return;
            ci.label = document.getElementById("clabel-" + id).value;
            if (ci.inCart) { cart["c" + id].name = ci.label || "Custom Work"; updateBill(); }
        }

        function syncCustomCart(id) {
            const ci = customItems.find(c => c.id === id);
            if (!ci) return;
            ci.price = parseInt(document.getElementById("cprice-" + id).value) || 0;
            ci.qty = parseInt(document.getElementById("cqty-" + id).value) || 1;
            if (ci.inCart) { cart["c" + id] = { name: ci.label || "Custom Work", price: ci.price, qty: ci.qty }; updateBill(); }
        }

        function toggleCustom(id) {
            const ci = customItems.find(c => c.id === id);
            if (!ci) return;
            ci.price = parseInt(document.getElementById("cprice-" + id).value) || 0;
            ci.qty = parseInt(document.getElementById("cqty-" + id).value) || 1;
            ci.label = document.getElementById("clabel-" + id).value;
            if (ci.inCart) {
                delete cart["c" + id]; ci.inCart = false;
                toast("Removed: " + (ci.label || "Custom Work"), true);
            } else {
                if (!ci.label.trim()) { toast("Enter work description first!", true); return; }
                cart["c" + id] = { name: ci.label, price: ci.price, qty: ci.qty };
                ci.inCart = true;
                toast("Added: " + ci.label);
            }
            updateBill(); renderServices();
        }

        function toggleService(i) {
            const price = parseInt(document.getElementById("price-" + i).value) || 0;
            const qty = parseInt(document.getElementById("qty-" + i).value) || 1;
            if (cart[i]) { delete cart[i]; toast("Removed: " + services[i].name, true); }
            else { cart[i] = { name: services[i].name, price, qty }; toast("Added: " + services[i].name); }
            updateBill(); renderServices();
        }

        function updateBill() {
            const tbody = document.getElementById("billBody");
            const items = Object.values(cart);
            let total = 0;

            const now = new Date();
            const displayDate = now.toLocaleDateString("en-IN");

            document.getElementById("bName").textContent = document.getElementById("customerName").value || "—";
            document.getElementById("bMobile").textContent = document.getElementById("mobile").value || "—";
            document.getElementById("bBike").textContent = document.getElementById("bikeNumber").value || "—";
            document.getElementById("bKm").textContent = document.getElementById("bikeKm").value || "—";
            document.getElementById("bDate").textContent = displayDate;

            if (items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3"><div class="bill-empty">No services added yet</div></td></tr>`;
                document.getElementById("billTotal").textContent = "₹0";
                return;
            }

            tbody.innerHTML = "";
            items.forEach(item => {
                const amount = item.price * item.qty;
                total += amount;
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${item.name}</td><td>${item.qty}</td><td>₹${amount}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById("billTotal").textContent = "₹" + total;
        }

        async function printBill() {
            const items = Object.values(cart);
            if (!items.length) { toast("Add services first!", true); return; }

            const name = document.getElementById("customerName").value || "-";
            const mobile = document.getElementById("mobile").value || "-";
            const bike = document.getElementById("bikeNumber").value || "-";
            const km = document.getElementById("bikeKm").value || "-";
            const date = new Date().toLocaleDateString("en-IN");

            let rows = "", total = 0;
            items.forEach(it => {
                const amt = it.price * it.qty;
                total += amt;
                rows += `<tr><td style="padding:2px 4px">${it.name}</td><td style="padding:2px 4px;text-align:center">${it.qty}</td><td style="padding:2px 4px;text-align:right">Rs.${amt}</td></tr>`;
            });

            const html = `
        <div style="font-family:monospace;font-size:12px;color:#000;background:#fff">
            <div style="text-align:center;font-size:16px;font-weight:bold;border-bottom:1px dashed #000;padding-bottom:6px;margin-bottom:6px">DR VEHICLE CARE</div>
            <div>Name: ${name}</div>
            <div>Mobile: ${mobile}</div>
            <div>Bike: ${bike} | KM: ${km}</div>
            <div>Date: ${date}</div>
            <hr style="border:none;border-top:1px dashed #000;margin:6px 0">
            <table width="100%" style="border-collapse:collapse">
                <tr><th style="text-align:left">Item</th><th>Qty</th><th style="text-align:right">Amt</th></tr>
                ${rows}
            </table>
            <hr style="border:none;border-top:1px dashed #000;margin:6px 0">
            <div style="text-align:right;font-size:14px;font-weight:bold">TOTAL: Rs.${total}</div>
            <div style="text-align:center;margin-top:10px;font-size:11px">Thank You! Visit Again</div>
        </div>`;

            document.getElementById("printArea").innerHTML = html;
            document.getElementById("printArea").style.display = "block";

            // Save bill BEFORE printing
            await saveBill(name, mobile, bike, km, total, items);
            toast("Bill saved! ✓");

            window.print();
            document.getElementById("printArea").style.display = "none";
        }

        function downloadCSV() {
            const items = Object.values(cart);
            if (!items.length) { toast("Nothing to export!", true); return; }
            const name = document.getElementById("customerName").value || "customer";
            const bike = document.getElementById("bikeNumber").value || "bike";
            let csv = "Service,Qty,Amount\n";
            let total = 0;
            items.forEach(it => { const amt = it.price * it.qty; total += amt; csv += `${it.name},${it.qty},${amt}\n`; });
            csv += `,,Total,${total}`;
            const blob = new Blob([csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = name + "_" + bike + ".csv";
            a.click();
            toast("Excel downloaded!");
        }

        function sendWhatsApp() {
            const mobile = document.getElementById("mobile").value.trim();
            if (!mobile || mobile.length < 10) { toast("Enter valid mobile number!", true); return; }
            const items = Object.values(cart);
            if (!items.length) { toast("Add services first!", true); return; }
            const name = document.getElementById("customerName").value;
            const bike = document.getElementById("bikeNumber").value;
            let lines = `*DR VEHICLE CARE*%0A*Bill for ${name}*%0ABike: ${bike}%0A%0A`;
            let total = 0;
            items.forEach(it => { const amt = it.price * it.qty; total += amt; lines += `• ${it.name} x${it.qty} = Rs.${amt}%0A`; });
            lines += `%0A*Total: Rs.${total}*%0AThank you!`;
            window.open(`https://wa.me/91${mobile}?text=${lines}`);
        }

        function clearAll() {
            cart = {}; customItems = [];
            ["customerName", "mobile", "bikeNumber", "bikeKm"].forEach(id => document.getElementById(id).value = "");
            updateBill(); renderServices();
            toast("Cleared!");
        }

        // ── HISTORY ──────────────────────────────────────────────────────────────────

        async function openHistory(type) {
            const today = new Date();
            let targetDate = new Date(today);
            if (type === 'Yesterday') targetDate.setDate(targetDate.getDate() - 1);

            const key = dateKey(targetDate);
            const bills = await loadBillsForKey(key);
            const displayDate = formatDisplayDate(key);

            document.getElementById("modalTitle").textContent = type + "'s Bills";
            const body = document.getElementById("modalBody");

            if (!bills.length) {
                body.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px;">No bills for ${type.toLowerCase()} (${displayDate})</div>`;
            } else {
                let total = 0;
                body.innerHTML = bills.map(b => {
                    total += b.total || 0;
                    return `<div class="history-item">
                <div>
                    <div class="h-name">${b.name}</div>
                    <div class="h-bike">${b.bike} · ${b.mobile}</div>
                </div>
                <div class="h-total">₹${b.total}</div>
            </div>`;
                }).join("") + `<div style="text-align:right;padding:10px 4px;font-family:'Barlow Condensed',sans-serif;font-size:20px;color:var(--muted)">Day Total: <span style="color:var(--red2)">₹${total}</span></div>`;
            }
            document.getElementById("historyModal").classList.add("open");
        }

        async function openMonthHistory() {
            const now = new Date();
            const thisYear = now.getFullYear();
            const thisMonth = now.getMonth();

            // Get all bill keys
            const keys = await getAllBillKeys();

            // Filter keys for this month: "bills:YYYY-MM-DD"
            const monthKeys = keys.filter(k => {
                const parts = k.replace('bills:', '').split('-');
                if (parts.length < 3) return false;
                return parseInt(parts[0]) === thisYear && parseInt(parts[1]) - 1 === thisMonth;
            });

            const monthStr = now.toLocaleString("en-IN", { month: "long", year: "numeric" });
            document.getElementById("modalTitle").textContent = monthStr;
            const body = document.getElementById("modalBody");

            // Load all bills for this month
            let allBills = [];
            for (const key of monthKeys) {
                const bills = await loadBillsForKey(key);
                bills.forEach(b => allBills.push({ ...b, _key: key }));
            }

            if (!allBills.length) {
                body.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px;">No bills this month</div>`;
                document.getElementById("historyModal").classList.add("open");
                return;
            }

            const grandTotal = allBills.reduce((s, b) => s + (b.total || 0), 0);
            const billCount = allBills.length;

            // Group by date key
            const grouped = {};
            allBills.forEach(b => {
                if (!grouped[b._key]) grouped[b._key] = [];
                grouped[b._key].push(b);
            });

            let html = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;">
            <div style="background:#1a1a2a;border:1px solid #333;border-radius:10px;padding:14px;text-align:center;">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Total Bills</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:#60a5fa;">${billCount}</div>
            </div>
            <div style="background:#1a2a1a;border:1px solid #333;border-radius:10px;padding:14px;text-align:center;">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Month Revenue</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--green);">₹${grandTotal}</div>
            </div>
        </div>`;

            const sortedKeys = Object.keys(grouped).sort();
            sortedKeys.forEach(key => {
                const dayBills = grouped[key];
                const dayTotal = dayBills.reduce((s, b) => s + (b.total || 0), 0);
                const displayDate = formatDisplayDate(key);
                html += `
            <div style="margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#252525;border-radius:8px;margin-bottom:6px;">
                    <span style="font-size:12px;font-weight:700;color:#aaa;letter-spacing:1px;">${displayDate}</span>
                    <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--yellow);">₹${dayTotal} · ${dayBills.length} bill${dayBills.length > 1 ? 's' : ''}</span>
                </div>`;
                dayBills.forEach(b => {
                    html += `<div class="history-item" style="margin-bottom:6px;">
                <div>
                    <div class="h-name">${b.name}</div>
                    <div class="h-bike">${b.bike} · ${b.mobile}</div>
                </div>
                <div class="h-total">₹${b.total}</div>
            </div>`;
                });
                html += `</div>`;
            });

            body.innerHTML = html;
            document.getElementById("historyModal").classList.add("open");
        }

        function closeModal(e) {
            if (e.target === document.getElementById("historyModal"))
                document.getElementById("historyModal").classList.remove("open");
        }

        let toastTimer;
        function toast(msg, isRed = false) {
            const el = document.getElementById("toast");
            el.textContent = msg;
            el.className = "toast show" + (isRed ? " red" : "");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.className = "toast", 2500);
        }

        ["customerName", "mobile", "bikeNumber", "bikeKm"].forEach(id =>
            document.getElementById(id).addEventListener("input", updateBill)
        );

        renderServices();
        updateBill();
    </script>
</body>

</html>
